<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026년 평생교육 및 취미여가 업무일지</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // 브라우저 환경에서 Babel의 내장 'react' 프리셋을 올바르게 참조하여 classic 런타임으로 등록합니다.
    Babel.registerPreset('react-classic', {
      presets: [
        [Babel.availablePresets['react'], { runtime: 'classic' }]
      ]
    });
  </script>
</head>
<body class="bg-gray-100 text-gray-800">
  <div id="root"></div>

  <!-- 등록한 'react-classic' 프리셋을 적용하여 import 오류 방지 -->
  <script type="text/babel" data-presets="react-classic">
    const { useState, useMemo, useEffect } = React;

    // --- 아이콘 컴포넌트 (lucide-react 대체) ---
    const IconBase = ({ children, className = "", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );

    const Settings = (props) => <IconBase {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></IconBase>;
    const Printer = (props) => <IconBase {...props}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></IconBase>;
    const Plus = (props) => <IconBase {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconBase>;
    const Trash2 = (props) => <IconBase {...props}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></IconBase>;
    const CalendarIcon = (props) => <IconBase {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></IconBase>;
    const Save = (props) => <IconBase {...props}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></IconBase>;
    const ArrowUp = (props) => <IconBase {...props}><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></IconBase>;
    const ArrowDown = (props) => <IconBase {...props}><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></IconBase>;
    const History = (props) => <IconBase {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></IconBase>;
    const RotateCcw = (props) => <IconBase {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconBase>;

    // --- 핵심 로직 및 데이터 ---
    const generateId = () => Math.random().toString(36).substring(2, 11) + Date.now().toString(36);

    const defaultApprovalLine = [
      { id: 'appr_1', role: '담당', mark: '' },
      { id: 'appr_2', role: '팀장', mark: '전결' },
      { id: 'appr_3', role: '부장', mark: '전결' },
      { id: 'appr_4', role: '관장', mark: '' }
    ];

    const initialDefaultItems = [
      { id: 'item_1', main: '평생교육', sub: '홍보', name: '홍보 및 모집' },
      { id: 'item_2', main: '평생교육', sub: '홍보', name: '강좌 접수' },
      { id: 'item_3', main: '평생교육', sub: '관리', name: '이용자 상담' },
      { id: 'item_4', main: '평생교육', sub: '관리', name: '이용자 간담회' },
      { id: 'item_5', main: '평생교육', sub: '관리', name: '강좌 평가' },
      { id: 'item_6', main: '평생교육', sub: '관리', name: '모니터링' },
      { id: 'item_7', main: '평생교육', sub: '강사관리', name: '강사위촉' },
      { id: 'item_8', main: '평생교육', sub: '강사관리', name: '강사간담회' },
      { id: 'item_9', main: '평생교육', sub: '평생교육', name: '국어' },
      { id: 'item_10', main: '평생교육', sub: '평생교육', name: '중국어' },
      { id: 'item_11', main: '취미여가', sub: '취미여가', name: '오일파스텔' },
      { id: 'item_12', main: '취미여가', sub: '취미여가', name: '어반스케치' },
      { id: 'item_13', main: '선배시민대학', sub: '선배시민대학', name: '선배시민교육' }
    ].map(item => ({
      id: item.id,
      versions: [{ versionId: generateId(), applyDate: '2000-01-01', main: item.main, sub: item.sub, name: item.name }],
      deletedDate: null
    }));

    const App = () => {
      const [isMounted, setIsMounted] = useState(false);
      const todayDate = new Date().toISOString().split('T')[0];
      
      const [selectedDate, setSelectedDate] = useState(() => {
        if (typeof window !== 'undefined') return window.localStorage.getItem('worklog_date_v3') || todayDate;
        return todayDate;
      });

      const [items, setItems] = useState(() => {
        if (typeof window !== 'undefined') {
          const v3 = window.localStorage.getItem('worklog_items_v3');
          if (v3) return JSON.parse(v3);
          
          const v2 = window.localStorage.getItem('worklog_items_v2');
          if (v2) {
            return JSON.parse(v2).map(item => ({
              id: item.id,
              versions: item.versions || [{ versionId: generateId(), applyDate: item.startDate || '2000-01-01', main: item.main || '', sub: item.sub || '', name: item.name || '' }],
              deletedDate: item.deletedDate || item.endDate || null
            }));
          }
        }
        return initialDefaultItems;
      });

      const [approvalLine, setApprovalLine] = useState(() => {
        if (typeof window !== 'undefined') {
          const saved = window.localStorage.getItem('worklog_approval_v3') || window.localStorage.getItem('worklog_approval_v2');
          if (saved) return JSON.parse(saved);
        }
        return defaultApprovalLine;
      });

      const [dailyRecords, setDailyRecords] = useState(() => {
        if (typeof window !== 'undefined') return JSON.parse(window.localStorage.getItem('worklog_daily_v3') || window.localStorage.getItem('worklog_daily_v2') || '{}');
        return {};
      });

      const [monthlyPlans, setMonthlyPlans] = useState(() => {
        if (typeof window !== 'undefined') return JSON.parse(window.localStorage.getItem('worklog_plans_v3') || window.localStorage.getItem('worklog_plans_v2') || '{}');
        return {};
      });

      const [remarks, setRemarks] = useState(() => {
        if (typeof window !== 'undefined') return JSON.parse(window.localStorage.getItem('worklog_remarks_v3') || window.localStorage.getItem('worklog_remarks_v2') || '{}');
        return {};
      });

      useEffect(() => {
        if (isMounted && typeof window !== 'undefined') {
          window.localStorage.setItem('worklog_date_v3', selectedDate);
          window.localStorage.setItem('worklog_items_v3', JSON.stringify(items));
          window.localStorage.setItem('worklog_approval_v3', JSON.stringify(approvalLine));
          window.localStorage.setItem('worklog_daily_v3', JSON.stringify(dailyRecords));
          window.localStorage.setItem('worklog_plans_v3', JSON.stringify(monthlyPlans));
          window.localStorage.setItem('worklog_remarks_v3', JSON.stringify(remarks));
        }
      }, [selectedDate, items, approvalLine, dailyRecords, monthlyPlans, remarks, isMounted]);

      useEffect(() => setIsMounted(true), []);

      const currentYear = selectedDate ? selectedDate.substring(0, 4) : '';
      const currentMonth = selectedDate ? selectedDate.substring(0, 7) : '';

      const [isSettingModalOpen, setIsSettingModalOpen] = useState(false);
      const [settingTab, setSettingTab] = useState('items'); 
      const [editingItems, setEditingItems] = useState([]);
      const [editingApprovalLine, setEditingApprovalLine] = useState([]);
      const [historyIdx, setHistoryIdx] = useState(null); 

      const openSettingModal = () => {
        const editData = items.map(item => {
          const sorted = [...item.versions].sort((a,b) => new Date(a.applyDate).getTime() - new Date(b.applyDate).getTime());
          const latest = sorted[sorted.length - 1] || { main: '', sub: '', name: '' };
          return {
            id: item.id,
            versions: JSON.parse(JSON.stringify(item.versions)), 
            deletedDate: item.deletedDate,
            main: latest.main,
            sub: latest.sub,
            name: latest.name,
          };
        });
        setEditingItems(editData);
        setEditingApprovalLine(JSON.parse(JSON.stringify(approvalLine)));
        setSettingTab('items');
        setIsSettingModalOpen(true);
      };

      const saveItems = () => {
        const cleanedAppr = editingApprovalLine.filter(appr => appr.role.trim() !== '');

        const newItemsToSave = editingItems.map(ei => {
          const sorted = [...ei.versions].sort((a,b) => new Date(a.applyDate).getTime() - new Date(b.applyDate).getTime());
          const latest = sorted[sorted.length - 1];

          if (latest && (latest.main !== ei.main || latest.sub !== ei.sub || latest.name !== ei.name) && ei.name.trim() !== '') {
            if (latest.applyDate === todayDate) {
              latest.main = ei.main;
              latest.sub = ei.sub;
              latest.name = ei.name;
            } else {
              ei.versions.push({
                versionId: generateId(),
                applyDate: todayDate,
                main: ei.main,
                sub: ei.sub,
                name: ei.name
              });
            }
          }

          return {
            id: ei.id,
            versions: ei.versions.filter(v => v.name.trim() !== ''),
            deletedDate: ei.deletedDate
          };
        }).filter(item => item.versions.length > 0);

        setItems(newItemsToSave);
        setApprovalLine(cleanedAppr);
        setIsSettingModalOpen(false);
      };

      const handleEditItem = (index, field, value) => {
        const newItems = [...editingItems];
        newItems[index][field] = value;
        setEditingItems(newItems);
      };

      const addNewItem = () => {
        const newId = `item_${generateId()}`;
        setEditingItems([
          ...editingItems,
          {
            id: newId,
            main: '', sub: '', name: '',
            versions: [{ versionId: generateId(), applyDate: todayDate, main: '', sub: '', name: '' }],
            deletedDate: null
          }
        ]);
      };

      const handleRemoveItem = (index) => {
        const newItems = [...editingItems];
        newItems[index].deletedDate = todayDate;
        setEditingItems(newItems);
      };

      const handleRestoreItem = (index) => {
        const newItems = [...editingItems];
        newItems[index].deletedDate = null;
        setEditingItems(newItems);
      };

      const moveItem = (index, direction) => {
        if (direction === -1 && index === 0) return;
        if (direction === 1 && index === editingItems.length - 1) return;
        const newItems = [...editingItems];
        const temp = newItems[index];
        newItems[index] = newItems[index + direction];
        newItems[index + direction] = temp;
        setEditingItems(newItems);
      };

      const currentHistoryItem = historyIdx !== null ? editingItems[historyIdx] : null;

      const updateVersion = (vIdx, field, value) => {
        const newItems = [...editingItems];
        newItems[historyIdx].versions[vIdx][field] = value;
        
        const sorted = [...newItems[historyIdx].versions].sort((a,b) => new Date(a.applyDate).getTime() - new Date(b.applyDate).getTime());
        const latest = sorted[sorted.length - 1];
        if (latest) {
          newItems[historyIdx].main = latest.main;
          newItems[historyIdx].sub = latest.sub;
          newItems[historyIdx].name = latest.name;
        }
        setEditingItems(newItems);
      };

      const addVersion = () => {
        const newItems = [...editingItems];
        const latest = [...newItems[historyIdx].versions].sort((a,b) => new Date(a.applyDate).getTime() - new Date(b.applyDate).getTime()).pop();
        newItems[historyIdx].versions.push({
          versionId: generateId(),
          applyDate: todayDate,
          main: latest ? latest.main : '',
          sub: latest ? latest.sub : '',
          name: latest ? latest.name : ''
        });
        setEditingItems(newItems);
      };

      const removeVersion = (vIdx) => {
        const newItems = [...editingItems];
        if (newItems[historyIdx].versions.length <= 1) {
          alert("최소 1개의 변경 이력(버전)은 유지해야 합니다.");
          return;
        }
        newItems[historyIdx].versions.splice(vIdx, 1);
        
        const sorted = [...newItems[historyIdx].versions].sort((a,b) => new Date(a.applyDate).getTime() - new Date(b.applyDate).getTime());
        const latest = sorted[sorted.length - 1];
        newItems[historyIdx].main = latest.main;
        newItems[historyIdx].sub = latest.sub;
        newItems[historyIdx].name = latest.name;
        setEditingItems(newItems);
      };

      const handleEditApproval = (index, field, value) => {
        const newAppr = [...editingApprovalLine];
        newAppr[index][field] = value;
        setEditingApprovalLine(newAppr);
      };
      const addApproval = () => {
        const newId = `appr_${generateId()}`;
        setEditingApprovalLine([...editingApprovalLine, { id: newId, role: '', mark: '' }]);
      };
      const removeApproval = (index) => setEditingApprovalLine(editingApprovalLine.filter((_, i) => i !== index));
      const moveApproval = (index, direction) => {
        if (direction === -1 && index === 0) return;
        if (direction === 1 && index === editingApprovalLine.length - 1) return;
        const newAppr = [...editingApprovalLine];
        const temp = newAppr[index];
        newAppr[index] = newAppr[index + direction];
        newAppr[index + direction] = temp;
        setEditingApprovalLine(newAppr);
      };

      const handleUpdate = (storeType, id, field, value) => {
        const numValue = value === '' ? 0 : parseInt(value, 10);
        
        if (storeType === 'daily') {
          setDailyRecords(prev => ({
            ...prev,
            [selectedDate]: {
              ...(prev[selectedDate] || {}),
              [id]: { ...(prev[selectedDate]?.[id] || { count: 0, people: 0 }), [field]: numValue }
            }
          }));
        } else {
          setMonthlyPlans(prev => ({
            ...prev,
            [currentMonth]: {
              ...(prev[currentMonth] || {}),
              [id]: { ...(prev[currentMonth]?.[id] || { count: 0, people: 0 }), [field]: numValue }
            }
          }));
        }
      };

      const { renderRows, grandTotal } = useMemo(() => {
        if (!selectedDate || !items) return { renderRows: [], grandTotal: {} };

        const activeItems = items.map(item => {
          const validVersions = item.versions.filter(v => v.applyDate <= selectedDate);
          if (validVersions.length === 0) return null; 
          
          validVersions.sort((a, b) => new Date(a.applyDate).getTime() - new Date(b.applyDate).getTime());
          const currentVersion = validVersions[validVersions.length - 1];
          
          if (item.deletedDate && selectedDate >= item.deletedDate) return null;

          return {
            id: item.id,
            main: currentVersion.main || '분류없음',
            sub: currentVersion.sub || '분류없음',
            name: currentVersion.name || '이름없음',
          };
        }).filter(Boolean);

        const tree = {};
        activeItems.forEach(item => {
          if (!tree[item.main]) tree[item.main] = {};
          if (!tree[item.main][item.sub]) tree[item.main][item.sub] = [];
          tree[item.main][item.sub].push(item);
        });

        const monthlyDataMap = {};
        const yearlyDataMap = {};
        
        Object.entries(dailyRecords || {}).forEach(([date, record]) => {
          if (date.startsWith(currentMonth)) {
            Object.entries(record || {}).forEach(([itemId, data]) => {
              if (!monthlyDataMap[itemId]) monthlyDataMap[itemId] = { count: 0, people: 0 };
              monthlyDataMap[itemId].count += (data.count || 0);
              monthlyDataMap[itemId].people += (data.people || 0);
            });
          }
          if (date.startsWith(currentYear)) {
            Object.entries(record || {}).forEach(([itemId, data]) => {
              if (!yearlyDataMap[itemId]) yearlyDataMap[itemId] = { count: 0, people: 0 };
              yearlyDataMap[itemId].count += (data.count || 0);
              yearlyDataMap[itemId].people += (data.people || 0);
            });
          }
        });

        const rows = [];
        const gTotal = { planC: 0, planP: 0, dayC: 0, dayP: 0, monC: 0, monP: 0, yearC: 0, yearP: 0 };

        Object.keys(tree).forEach(main => {
          const subKeys = Object.keys(tree[main]);
          const mainItemCount = subKeys.reduce((acc, sub) => acc + tree[main][sub].length, 0);
          
          const mainTotal = { planC: 0, planP: 0, dayC: 0, dayP: 0, monC: 0, monP: 0, yearC: 0, yearP: 0 };

          subKeys.forEach((sub, subIdx) => {
            const subItems = tree[main][sub];
            subItems.forEach((item, itemIdx) => {
              const plan = (monthlyPlans[currentMonth] && monthlyPlans[currentMonth][item.id]) || { count: 0, people: 0 };
              const daily = (dailyRecords[selectedDate] && dailyRecords[selectedDate][item.id]) || { count: 0, people: 0 };
              const monthly = monthlyDataMap[item.id] || { count: 0, people: 0 };
              const yearly = yearlyDataMap[item.id] || { count: 0, people: 0 };

              mainTotal.planC += plan.count; mainTotal.planP += plan.people;
              mainTotal.dayC += daily.count; mainTotal.dayP += daily.people;
              mainTotal.monC += monthly.count; mainTotal.monP += monthly.people;
              mainTotal.yearC += yearly.count; mainTotal.yearP += yearly.people;

              rows.push({
                type: 'data',
                item,
                isFirstMain: subIdx === 0 && itemIdx === 0,
                mainRowSpan: mainItemCount,
                isFirstSub: itemIdx === 0,
                subRowSpan: subItems.length,
                plan, daily, monthly, yearly
              });
            });
          });

          gTotal.planC += mainTotal.planC; gTotal.planP += mainTotal.planP;
          gTotal.dayC += mainTotal.dayC; gTotal.dayP += mainTotal.dayP;
          gTotal.monC += mainTotal.monC; gTotal.monP += mainTotal.monP;
          gTotal.yearC += mainTotal.yearC; gTotal.yearP += mainTotal.yearP;

          rows.push({ type: 'subtotal', title: `${main} 소계`, data: mainTotal });
        });

        return { renderRows: rows, grandTotal: gTotal };
      }, [items, selectedDate, dailyRecords, monthlyPlans, currentMonth, currentYear]);

      const handlePrint = () => {
        window.print();
      };

      const uniqueMains = [...new Set(editingItems.map(i => i.main).filter(Boolean))];
      const uniqueSubs = [...new Set(editingItems.map(i => i.sub).filter(Boolean))];

      if (!isMounted) return null;

      return (
        <div className="min-h-screen bg-gray-100 p-4 sm:p-8 font-sans text-gray-800">
          <style dangerouslySetInnerHTML={{__html: `
            /* 화면용 기본 입력칸 스핀버튼 숨김 */
            input[type=number]::-webkit-inner-spin-button, 
            input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
            input[type=number] { -moz-appearance: textfield; }

            /* 인쇄용 글로벌 스타일 (A4 세로, 2장 이내 최적화) */
            @media print {
              body { background-color: white; margin: 0; padding: 0; color: black !important; }
              @page { size: A4 portrait; margin: 10mm 15mm; }
              .print-hidden { display: none !important; }
              .print-shadow-none { box-shadow: none !important; margin: 0 !important; padding: 0 !important; max-width: 100% !important; border: none !important; }
              
              /* 테이블 콤팩트화 및 열 너비 고정 */
              table { width: 100% !important; page-break-inside: auto; table-layout: fixed !important; }
              tr { page-break-inside: avoid; page-break-after: auto; }
              th, td { 
                padding: 4px 2px !important; 
                font-size: 11px !important; 
                line-height: 1.2 !important; 
              }

              /* 텍스트 컬럼: 너비 확보 및 줄바꿈 완전 차단 */
              .col-main { width: 12% !important; white-space: nowrap !important; word-break: keep-all !important; }
              .col-sub  { width: 15% !important; white-space: nowrap !important; word-break: keep-all !important; }
              .col-name { width: 25% !important; white-space: nowrap !important; word-break: keep-all !important; text-align: left !important; padding-left: 6px !important; }
              
              /* 숫자 입력 컬럼: 남은 48% 공간을 8개 열에 각각 6%씩 동일하게 배분 */
              .col-num { width: 6% !important; }
              
              /* 텍스트 입력칸 최적화 */
              input, textarea { 
                border: none !important; 
                background: transparent !important; 
                resize: none !important; 
                font-size: 11px !important; 
                color: black !important; 
              }
              input[type="number"] { 
                width: 100% !important; 
                height: auto !important; 
                padding: 0 !important; 
                text-align: center;
              }
              
              /* 제목 및 여백 압축 */
              h1 { font-size: 20px !important; margin-bottom: 2px !important; }
              p.text-gray-500 { margin-top: 0 !important; font-size: 12px !important; }
              .pt-4 { padding-top: 0 !important; }
              .mb-8 { margin-bottom: 12px !important; }
              .mt-8 { margin-top: 12px !important; }
              
              /* 결재칸 사이즈 압축 */
              .h-16 { height: 40px !important; }
              .w-16 { width: 45px !important; }
              
              /* 비고란 크기 고정 */
              textarea { height: 60px !important; }
            }
          `}} />
          
          <datalist id="main-options">{uniqueMains.map(m => <option key={`dl-main-${m}`} value={m} />)}</datalist>
          <datalist id="sub-options">{uniqueSubs.map(s => <option key={`dl-sub-${s}`} value={s} />)}</datalist>

          <div className="max-w-6xl mx-auto mb-6 bg-white p-4 rounded-xl shadow-sm flex flex-col sm:flex-row justify-between items-center gap-4 print-hidden border border-gray-200">
            <div className="flex items-center gap-4">
              <div className="flex items-center bg-blue-50 text-blue-700 px-4 py-2 rounded-lg font-medium border border-blue-100">
                <CalendarIcon className="w-5 h-5 mr-2" />
                <input 
                  type="date" 
                  value={selectedDate} 
                  onChange={(e) => setSelectedDate(e.target.value)}
                  className="bg-transparent border-none outline-none font-bold cursor-pointer"
                />
              </div>
            </div>
            <div className="flex items-center gap-3">
              <button 
                onClick={openSettingModal}
                className="flex items-center px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition-colors font-medium border border-gray-200"
              >
                <Settings className="w-4 h-4 mr-2" /> 항목 설정
              </button>
              <button 
                onClick={handlePrint}
                className="flex items-center px-5 py-2 bg-slate-800 hover:bg-slate-900 text-white rounded-lg shadow-sm transition-colors font-medium"
              >
                <Printer className="w-4 h-4 mr-2" /> 인쇄 / PDF 저장
              </button>
            </div>
          </div>

          <div className="max-w-6xl mx-auto bg-white shadow-xl rounded-sm p-8 print-shadow-none border border-gray-200">
            <div className="flex justify-between items-start mb-8">
              <div className="pt-4">
                <h1 className="text-3xl font-extrabold text-gray-900 tracking-tight">
                  {currentYear}년 평생교육 및 취미여가 업무일지
                </h1>
                <p className="text-gray-500 mt-2 font-medium">일자 : {selectedDate}</p>
              </div>

              <table className="border-collapse border-2 border-gray-800 text-sm bg-white">
                <tbody>
                  <tr>
                    <td rowSpan={2} className="w-8 bg-gray-100 border border-gray-800 font-bold px-1 whitespace-nowrap text-center">결<br/>재</td>
                    {approvalLine.map((appr) => (
                      <td key={`appr-role-${appr.id}`} className="w-16 bg-gray-100 border border-gray-800 py-1 font-medium text-center">
                        {appr.role}
                      </td>
                    ))}
                  </tr>
                  <tr>
                    {approvalLine.map((appr) => (
                      <td key={`appr-mark-${appr.id}`} className="w-16 h-16 border border-gray-800 align-middle text-center relative p-0">
                        {appr.mark && (
                          <span className="absolute inset-0 flex items-center justify-center font-bold text-gray-800 text-base">
                            {appr.mark}
                          </span>
                        )}
                      </td>
                    ))}
                  </tr>
                </tbody>
              </table>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full border-collapse border border-gray-400 text-sm text-center">
                <thead>
                  <tr className="bg-gray-100">
                    <th rowSpan={2} className="border border-gray-400 p-2 font-bold w-24 col-main">대분류</th>
                    <th rowSpan={2} className="border border-gray-400 p-2 font-bold w-32 col-sub">중분류</th>
                    <th rowSpan={2} className="border border-gray-400 p-2 font-bold col-name">항목명</th>
                    <th colSpan={2} className="border border-gray-400 p-2 font-bold bg-blue-50 text-blue-800">월 계획 ({currentMonth})</th>
                    <th colSpan={2} className="border border-gray-400 p-2 font-bold bg-green-50 text-green-800">일계 ({selectedDate.slice(-2)}일)</th>
                    <th colSpan={2} className="border border-gray-400 p-2 font-bold">월계</th>
                    <th colSpan={2} className="border border-gray-400 p-2 font-bold">누계</th>
                  </tr>
                  <tr className="bg-gray-50">
                    <th className="border border-gray-400 p-1 w-14 font-medium bg-blue-50 col-num">건</th>
                    <th className="border border-gray-400 p-1 w-14 font-medium bg-blue-50 col-num">명</th>
                    <th className="border border-gray-400 p-1 w-14 font-medium bg-green-50 col-num">건</th>
                    <th className="border border-gray-400 p-1 w-14 font-medium bg-green-50 col-num">명</th>
                    <th className="border border-gray-400 p-1 w-14 font-medium col-num">건</th>
                    <th className="border border-gray-400 p-1 w-14 font-medium col-num">명</th>
                    <th className="border border-gray-400 p-1 w-14 font-medium col-num">건</th>
                    <th className="border border-gray-400 p-1 w-14 font-medium col-num">명</th>
                  </tr>
                </thead>
                <tbody>
                  <tr className="bg-slate-800 text-white font-bold">
                    <td colSpan={3} className="border border-gray-400 p-2">총 계</td>
                    <td className="border border-gray-400 p-2 bg-slate-700 col-num">{grandTotal.planC || 0}</td>
                    <td className="border border-gray-400 p-2 bg-slate-700 col-num">{grandTotal.planP || 0}</td>
                    <td className="border border-gray-400 p-2 bg-slate-700 col-num">{grandTotal.dayC || 0}</td>
                    <td className="border border-gray-400 p-2 bg-slate-700 col-num">{grandTotal.dayP || 0}</td>
                    <td className="border border-gray-400 p-2 bg-slate-700 col-num">{grandTotal.monC || 0}</td>
                    <td className="border border-gray-400 p-2 bg-slate-700 col-num">{grandTotal.monP || 0}</td>
                    <td className="border border-gray-400 p-2 bg-slate-700 col-num">{grandTotal.yearC || 0}</td>
                    <td className="border border-gray-400 p-2 bg-slate-700 col-num">{grandTotal.yearP || 0}</td>
                  </tr>

                  {renderRows.map((row, idx) => {
                    if (row.type === 'subtotal') {
                      return (
                        <tr key={`subtotal-${idx}`} className="bg-gray-100 font-bold">
                          <td colSpan={3} className="border border-gray-400 p-2 tracking-wide text-gray-700">{row.title}</td>
                          <td className="border border-gray-400 p-2 text-blue-800 col-num">{row.data.planC}</td>
                          <td className="border border-gray-400 p-2 text-blue-800 col-num">{row.data.planP}</td>
                          <td className="border border-gray-400 p-2 text-green-800 col-num">{row.data.dayC}</td>
                          <td className="border border-gray-400 p-2 text-green-800 col-num">{row.data.dayP}</td>
                          <td className="border border-gray-400 p-2 text-gray-800 col-num">{row.data.monC}</td>
                          <td className="border border-gray-400 p-2 text-gray-800 col-num">{row.data.monP}</td>
                          <td className="border border-gray-400 p-2 text-gray-800 col-num">{row.data.yearC}</td>
                          <td className="border border-gray-400 p-2 text-gray-800 col-num">{row.data.yearP}</td>
                        </tr>
                      );
                    }

                    return (
                      <tr key={`row-${row.item.id}`} className="hover:bg-gray-50 transition-colors">
                        {row.isFirstMain && (
                          <td rowSpan={row.mainRowSpan} className="border border-gray-400 p-1 font-bold bg-white align-middle col-main">
                            {row.item.main}
                          </td>
                        )}
                        {row.isFirstSub && (
                          <td rowSpan={row.subRowSpan} className="border border-gray-400 p-1 font-medium bg-white align-middle col-sub">
                            {row.item.sub}
                          </td>
                        )}
                        <td className="border border-gray-400 p-1 px-3 col-name text-left">{row.item.name}</td>
                        
                        <td className="border border-gray-300 p-0 bg-blue-50/30 col-num">
                          <input 
                            type="number" min="0" value={row.plan.count || ''} 
                            onChange={(e) => handleUpdate('plan', row.item.id, 'count', e.target.value)}
                            className="w-full h-full text-center p-2 outline-none focus:bg-blue-100 hover:bg-blue-50 transition-colors bg-transparent" placeholder="0"
                          />
                        </td>
                        <td className="border border-gray-300 p-0 bg-blue-50/30 col-num">
                          <input 
                            type="number" min="0" value={row.plan.people || ''} 
                            onChange={(e) => handleUpdate('plan', row.item.id, 'people', e.target.value)}
                            className="w-full h-full text-center p-2 outline-none focus:bg-blue-100 hover:bg-blue-50 transition-colors bg-transparent" placeholder="0"
                          />
                        </td>
                        
                        <td className="border border-gray-300 p-0 bg-green-50/30 col-num">
                          <input 
                            type="number" min="0" value={row.daily.count || ''} 
                            onChange={(e) => handleUpdate('daily', row.item.id, 'count', e.target.value)}
                            className="w-full h-full text-center p-2 outline-none focus:bg-green-100 hover:bg-green-50 transition-colors bg-transparent font-medium" placeholder="0"
                          />
                        </td>
                        <td className="border border-gray-300 p-0 bg-green-50/30 col-num">
                          <input 
                            type="number" min="0" value={row.daily.people || ''} 
                            onChange={(e) => handleUpdate('daily', row.item.id, 'people', e.target.value)}
                            className="w-full h-full text-center p-2 outline-none focus:bg-green-100 hover:bg-green-50 transition-colors bg-transparent font-medium" placeholder="0"
                          />
                        </td>
                        
                        <td className="border border-gray-300 p-2 bg-gray-50 col-num">{row.monthly.count}</td>
                        <td className="border border-gray-300 p-2 bg-gray-50 col-num">{row.monthly.people}</td>
                        <td className="border border-gray-300 p-2 bg-gray-50 col-num">{row.yearly.count}</td>
                        <td className="border border-gray-300 p-2 bg-gray-50 col-num">{row.yearly.people}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            <div className="mt-8 border border-gray-400">
              <div className="bg-gray-100 p-2 border-b border-gray-400 font-bold text-center">비 고</div>
              <textarea
                className="w-full h-32 p-4 outline-none resize-none bg-transparent"
                value={remarks[selectedDate] || ''}
                onChange={(e) => setRemarks({ ...remarks, [selectedDate]: e.target.value })}
                placeholder="특이사항 및 비고를 입력하세요"
              ></textarea>
            </div>
          </div>

          {isSettingModalOpen && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 print-hidden p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl flex flex-col max-h-[90vh] overflow-hidden">
                <div className="p-6 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                  <div className="flex items-center gap-4">
                    <h2 className="text-xl font-bold text-gray-800 flex items-center">
                      <Settings className="w-5 h-5 mr-2 text-gray-500" /> 설정
                    </h2>
                    <div className="flex bg-gray-200 p-1 rounded-lg">
                      <button
                        onClick={() => setSettingTab('items')}
                        className={`px-4 py-1.5 text-sm font-bold rounded-md transition-all ${settingTab === 'items' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                      >
                        항목 관리
                      </button>
                      <button
                        onClick={() => setSettingTab('approval')}
                        className={`px-4 py-1.5 text-sm font-bold rounded-md transition-all ${settingTab === 'approval' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                      >
                        결재선 관리
                      </button>
                    </div>
                  </div>
                  <button onClick={() => setIsSettingModalOpen(false)} className="text-gray-500 hover:text-gray-800 font-bold text-xl px-2">&times;</button>
                </div>
                
                <div className="p-6 overflow-y-auto bg-gray-50 flex-1 relative">
                  
                  {settingTab === 'items' && (
                    <>
                      <div className="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden">
                        <table className="w-full text-left border-collapse min-w-max">
                          <thead className="bg-gray-100 text-gray-600 text-sm">
                            <tr>
                              <th className="p-3 border-b font-semibold w-1/4">대분류</th>
                              <th className="p-3 border-b font-semibold w-1/4">중분류</th>
                              <th className="p-3 border-b font-semibold w-1/4">항목명</th>
                              <th className="p-3 border-b font-semibold w-32 text-center">관리 (이력/순서/삭제)</th>
                            </tr>
                          </thead>
                          <tbody>
                            {editingItems.map((item, idx) => {
                              const isDel = !!item.deletedDate;
                              return (
                              <tr key={`edit-item-${item.id}`} className={`group border-b last:border-0 transition-colors ${isDel ? 'bg-gray-100/70' : 'hover:bg-gray-50'}`}>
                                <td className="p-2">
                                  <input 
                                    list="main-options" disabled={isDel}
                                    className={`w-full p-2 border border-transparent rounded outline-none transition-all text-sm ${isDel ? 'text-gray-400 bg-transparent line-through' : 'hover:border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-transparent'}`}
                                    value={item.main} onChange={(e) => handleEditItem(idx, 'main', e.target.value)} placeholder="직접입력/선택"
                                  />
                                </td>
                                <td className="p-2">
                                  <input 
                                    list="sub-options" disabled={isDel}
                                    className={`w-full p-2 border border-transparent rounded outline-none transition-all text-sm ${isDel ? 'text-gray-400 bg-transparent line-through' : 'hover:border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-transparent'}`}
                                    value={item.sub} onChange={(e) => handleEditItem(idx, 'sub', e.target.value)} placeholder="직접입력/선택"
                                  />
                                </td>
                                <td className="p-2">
                                  <input disabled={isDel}
                                    className={`w-full p-2 border rounded outline-none text-sm ${isDel ? 'text-gray-400 bg-transparent border-transparent line-through' : 'border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500'}`}
                                    value={item.name} onChange={(e) => handleEditItem(idx, 'name', e.target.value)} placeholder="항목명"
                                  />
                                </td>
                                <td className="p-2 text-center flex items-center justify-center gap-1">
                                  <button onClick={() => setHistoryIdx(idx)} className="p-1.5 text-gray-500 hover:text-indigo-600 transition-colors rounded hover:bg-indigo-50" title="변경 이력 및 삭제일자 관리">
                                    <History className="w-4 h-4" />
                                  </button>
                                  <button onClick={() => moveItem(idx, -1)} disabled={idx === 0 || isDel} className="p-1.5 text-gray-400 hover:text-blue-600 disabled:opacity-20 transition-colors rounded hover:bg-blue-50" title="위로">
                                    <ArrowUp className="w-4 h-4" />
                                  </button>
                                  <button onClick={() => moveItem(idx, 1)} disabled={idx === editingItems.length - 1 || isDel} className="p-1.5 text-gray-400 hover:text-blue-600 disabled:opacity-20 transition-colors rounded hover:bg-blue-50" title="아래로">
                                    <ArrowDown className="w-4 h-4" />
                                  </button>
                                  {isDel ? (
                                    <button onClick={() => handleRestoreItem(idx)} className="p-1.5 text-orange-500 hover:text-orange-600 transition-colors rounded hover:bg-orange-50 font-bold" title="삭제 복원">
                                      <RotateCcw className="w-4 h-4" />
                                    </button>
                                  ) : (
                                    <button onClick={() => handleRemoveItem(idx)} className="p-1.5 text-gray-400 hover:text-red-500 transition-colors rounded hover:bg-red-50" title="표시 종료(삭제)">
                                      <Trash2 className="w-4 h-4" />
                                    </button>
                                  )}
                                </td>
                              </tr>
                            )})}
                          </tbody>
                        </table>
                      </div>
                      <button 
                        onClick={addNewItem} 
                        className="mt-4 w-full py-3 border-2 border-dashed border-gray-300 text-gray-500 rounded-lg flex items-center justify-center hover:border-blue-500 hover:text-blue-600 hover:bg-blue-50 transition-colors font-medium"
                      >
                        <Plus className="w-5 h-5 mr-2" /> 새 항목 추가
                      </button>
                      <p className="text-xs text-gray-500 mt-2">* 텍스트를 바로 수정하고 저장하면 오늘 날짜를 기준으로 새 버전이 자동 생성됩니다.</p>
                    </>
                  )}

                  {settingTab === 'approval' && (
                    <>
                      <div className="bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden w-full max-w-2xl mx-auto">
                        <table className="w-full text-left border-collapse">
                          <thead className="bg-gray-100 text-gray-600 text-sm">
                            <tr>
                              <th className="p-3 border-b font-semibold w-16 text-center">순서</th>
                              <th className="p-3 border-b font-semibold">직위명 (예: 팀장)</th>
                              <th className="p-3 border-b font-semibold w-32 text-center">전결 표시</th>
                              <th className="p-3 border-b font-semibold w-24 text-center">관리</th>
                            </tr>
                          </thead>
                          <tbody>
                            {editingApprovalLine.map((appr, idx) => (
                              <tr key={`edit-appr-${appr.id}`} className="hover:bg-gray-50 group border-b last:border-0">
                                <td className="p-3 text-center text-gray-400 font-medium">{idx + 1}</td>
                                <td className="p-2">
                                  <input 
                                    className="w-full p-2 border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded outline-none"
                                    value={appr.role} onChange={(e) => handleEditApproval(idx, 'role', e.target.value)} placeholder="직위명 입력"
                                  />
                                </td>
                                <td className="p-2 text-center">
                                  <input 
                                    className="w-full p-2 border border-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded outline-none text-center"
                                    value={appr.mark} onChange={(e) => handleEditApproval(idx, 'mark', e.target.value)} placeholder="전결"
                                  />
                                </td>
                                <td className="p-2 text-center flex items-center justify-center gap-1">
                                  <button onClick={() => moveApproval(idx, -1)} disabled={idx === 0} className="p-1.5 text-gray-400 hover:text-blue-600 disabled:opacity-30 transition-colors rounded hover:bg-blue-50" title="위로">
                                    <ArrowUp className="w-4 h-4" />
                                  </button>
                                  <button onClick={() => moveApproval(idx, 1)} disabled={idx === editingApprovalLine.length - 1} className="p-1.5 text-gray-400 hover:text-blue-600 disabled:opacity-30 transition-colors rounded hover:bg-blue-50" title="아래로">
                                    <ArrowDown className="w-4 h-4" />
                                  </button>
                                  <button onClick={() => removeApproval(idx)} className="p-1.5 text-gray-400 hover:text-red-500 transition-colors rounded hover:bg-red-50" title="삭제">
                                    <Trash2 className="w-4 h-4" />
                                  </button>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                      <div className="w-full max-w-2xl mx-auto mt-4">
                        <button onClick={addApproval} className="w-full py-3 border-2 border-dashed border-gray-300 text-gray-500 rounded-lg flex items-center justify-center hover:border-blue-500 hover:text-blue-600 hover:bg-blue-50 transition-colors font-medium">
                          <Plus className="w-5 h-5 mr-2" /> 결재칸 추가
                        </button>
                      </div>
                    </>
                  )}

                  {currentHistoryItem && (
                    <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-[60] p-4 flex items-start justify-center overflow-y-auto">
                      <div className="bg-white border border-gray-300 rounded-xl shadow-2xl w-full max-w-4xl flex flex-col mb-10">
                        <div className="flex justify-between items-center p-5 border-b bg-indigo-50/50 rounded-t-xl">
                          <div>
                            <h3 className="text-lg font-bold text-gray-800 flex items-center">
                              <History className="w-5 h-5 mr-2 text-indigo-600" /> 
                              <span className="text-indigo-700 mr-2">{currentHistoryItem.name || '새 항목'}</span> 변경 이력 (Time Travel)
                            </h3>
                            <p className="text-xs text-gray-500 mt-1">항목의 과거 이름/분류를 관리합니다. 날짜에 맞춰 표가 동적으로 바뀝니다.</p>
                          </div>
                          <button onClick={() => setHistoryIdx(null)} className="text-gray-400 hover:text-gray-800 font-bold text-2xl px-2">&times;</button>
                        </div>
                        
                        <div className="p-6">
                          <table className="w-full text-left border-collapse text-sm mb-4">
                            <thead className="bg-gray-100 text-gray-600">
                              <tr>
                                <th className="p-3 border-b font-semibold w-40 text-indigo-600">적용 시작일</th>
                                <th className="p-3 border-b font-semibold w-1/4">대분류</th>
                                <th className="p-3 border-b font-semibold w-1/4">중분류</th>
                                <th className="p-3 border-b font-semibold">항목명</th>
                                <th className="p-3 border-b font-semibold w-20 text-center">삭제</th>
                              </tr>
                            </thead>
                            <tbody>
                              {currentHistoryItem.versions.sort((a,b) => new Date(b.applyDate).getTime() - new Date(a.applyDate).getTime()).map((v, renderIdx) => {
                                const vIdx = currentHistoryItem.versions.findIndex(orig => orig.versionId === v.versionId);
                                return (
                                <tr key={v.versionId} className="border-b last:border-0 hover:bg-indigo-50/30">
                                  <td className="p-2">
                                    <input type="date" value={v.applyDate} onChange={(e) => updateVersion(vIdx, 'applyDate', e.target.value)}
                                      className="w-full p-2 border border-gray-200 rounded focus:border-indigo-500 focus:ring-1 outline-none font-bold text-indigo-700 bg-white" />
                                  </td>
                                  <td className="p-2">
                                    <input value={v.main} onChange={(e) => updateVersion(vIdx, 'main', e.target.value)}
                                      className="w-full p-2 border border-gray-200 rounded focus:border-indigo-500 focus:ring-1 outline-none bg-white" placeholder="대분류" />
                                  </td>
                                  <td className="p-2">
                                    <input value={v.sub} onChange={(e) => updateVersion(vIdx, 'sub', e.target.value)}
                                      className="w-full p-2 border border-gray-200 rounded focus:border-indigo-500 focus:ring-1 outline-none bg-white" placeholder="중분류" />
                                  </td>
                                  <td className="p-2">
                                    <input value={v.name} onChange={(e) => updateVersion(vIdx, 'name', e.target.value)}
                                      className="w-full p-2 border border-gray-200 rounded focus:border-indigo-500 focus:ring-1 outline-none bg-white font-medium" placeholder="항목명" />
                                  </td>
                                  <td className="p-2 text-center">
                                    <button onClick={() => removeVersion(vIdx)} className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded transition-colors" title="이 이력 파기">
                                      <Trash2 className="w-4 h-4 mx-auto" />
                                    </button>
                                  </td>
                                </tr>
                              )})}
                            </tbody>
                          </table>
                          
                          <button onClick={addVersion} className="w-full py-2 border border-indigo-200 text-indigo-600 bg-indigo-50 rounded hover:bg-indigo-100 transition-colors text-sm font-bold flex items-center justify-center">
                            <Plus className="w-4 h-4 mr-1" /> 과거/미래 변경 이력 수동 추가
                          </button>

                          <div className="mt-8 p-5 bg-gray-50 border border-gray-200 rounded-lg">
                            <h4 className="font-bold text-gray-700 mb-2 flex items-center">
                              <Trash2 className="w-4 h-4 mr-2" /> 표시 종료 (삭제 처리)
                            </h4>
                            <div className="flex items-center gap-4">
                              <input 
                                type="date" 
                                value={currentHistoryItem.deletedDate || ''} 
                                onChange={(e) => {
                                  const newItems = [...editingItems];
                                  newItems[historyIdx].deletedDate = e.target.value || null;
                                  setEditingItems(newItems);
                                }}
                                className="p-2 border border-gray-300 rounded outline-none focus:border-red-500 bg-white font-medium text-red-600"
                              />
                              <p className="text-sm text-gray-500">
                                지정된 날짜 <span className="font-bold text-red-500">이후부터</span> 업무일지 표에서 항목이 완전히 사라집니다. <br/>
                                (과거 일지를 볼 때 지장이 없도록 날짜를 신중히 선택하세요. 복원하려면 비워두세요)
                              </p>
                            </div>
                          </div>

                        </div>
                        <div className="p-4 border-t bg-gray-50 flex justify-end rounded-b-xl">
                          <button onClick={() => setHistoryIdx(null)} className="px-6 py-2 bg-slate-800 text-white rounded-lg font-medium hover:bg-slate-900 transition-colors">
                            확인 후 닫기
                          </button>
                        </div>
                      </div>
                    </div>
                  )}

                </div>

                <div className="p-4 border-t border-gray-200 bg-white flex justify-end gap-3 z-10 relative">
                  <button onClick={() => setIsSettingModalOpen(false)} className="px-5 py-2.5 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 font-medium transition-colors">
                    취소
                  </button>
                  <button onClick={saveItems} className="px-5 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-700 text-white flex items-center font-medium shadow-sm transition-colors">
                    <Save className="w-4 h-4 mr-2" /> 전체 변경사항 저장
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // --- React 렌더링 ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
